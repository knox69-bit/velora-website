<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velora Website</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Welcome to Velora</h1>
        <h2>where style meets the sun</h2>
        <nav>
            <a href="cart.html" class="cart-link">🛒 View Cart</a>
        </nav>
    </header>
    <main>
        <section class="products">
            <h3>Our Sunglasses Collection</h3>
            <div class="product-grid">
                <a href="classic-aviator.html" class="product-card-link">
                    <div class="product-card">
                        <img src="imgs\Classic Aviator Sunglasses.webp" alt="Classic Aviator Sunglasses">
                        <h4>Classic Aviator</h4>
                        <p>$79.99</p>
                        <button>Add to Cart</button>
                    </div>
                </a>
                <a href="retro-round.html" class="product-card-link">
                    <div class="product-card">
                        <img src="imgs/Retro Round Sunglasses.webp" alt="Retro Round Sunglasses">
                        <h4>Retro Round</h4>
                        <p>$69.99</p>
                        <button>Add to Cart</button>
                    </div>
                </a>
                <a href="sporty-shield.html" class="product-card-link">
                    <div class="product-card">
                        <img src="imgs/Sporty Shield Sunglasses.webp" alt="Sporty Shield Sunglasses">
                        <h4>Sporty Shield</h4>
                        <p>$89.99</p>
                        <button>Add to Cart</button>
                    </div>
                </a>
                <!-- Add more products as needed -->
            </div>
        </section>
    </main>
    <footer>
        <p>
            &copy; 2023 Velora. All rights reserved. |
            <a href="https://wa.me/96176574238" target="_blank" class="contact-link">Contact Us</a>
        </p>
    </footer>
    <div id="toast" class="toast"></div>
    <script src="js/main.js"></script>
</body>
</html>
